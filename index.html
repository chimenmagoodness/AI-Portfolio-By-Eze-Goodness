<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eze Goodness — Full-Stack Developer & Prompt Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --primary: #FFA94D;
            --primary-light: #FFB366;
            --primary-glow: rgba(255, 169, 77, 0.3);
            --secondary: #1a1a2e;
            --accent: #7B68EE;
            --bg: #FAFAF8;
            --surface: #FFFFFF;
            --surface-hover: #F5F5F3;
            --text: #1a1a2e;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0,0,0,.05),0 2px 4px -1px rgba(0,0,0,.03);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,.08),0 10px 10px -5px rgba(0,0,0,.02);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        [data-theme="dark"] {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-hover: #1a1a24;
            --text: #E2E8F0;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border: #1e1e2e;
            --shadow: 0 4px 6px -1px rgba(0,0,0,.3),0 2px 4px -1px rgba(0,0,0,.2);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,.4),0 10px 10px -5px rgba(0,0,0,.3);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Sora',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;transition:var(--transition);overflow-x:hidden;}
        .ambient-bg{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden;}
        .ambient-bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 70%,var(--primary-glow) 0%,transparent 50%),radial-gradient(circle at 70% 30%,rgba(123,104,238,.08) 0%,transparent 50%);animation:ambientMove 20s ease-in-out infinite;}
        [data-theme="dark"] .ambient-bg::before{background:radial-gradient(circle at 30% 70%,rgba(255,169,77,.08) 0%,transparent 50%),radial-gradient(circle at 70% 30%,rgba(123,104,238,.05) 0%,transparent 50%);}
        @keyframes ambientMove{0%,100%{transform:translate(0,0) rotate(0deg);}33%{transform:translate(2%,2%) rotate(1deg);}66%{transform:translate(-1%,1%) rotate(-1deg);}}
        .header{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 1.5rem;background:rgba(255,255,255,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:var(--transition);}
        [data-theme="dark"] .header{background:rgba(18,18,26,.8);}
        .brand{display:flex;align-items:center;gap:.75rem;}
        .brand-icon{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--primary);box-shadow:0 2px 8px var(--primary-glow);animation:pulse 3s ease-in-out infinite;}
        .brand-icon img{width:100%;height:100%;object-fit:cover;display:block;}
        @keyframes pulse{0%,100%{box-shadow:0 2px 8px var(--primary-glow);}50%{box-shadow:0 2px 20px var(--primary-glow),0 0 40px rgba(255,169,77,.15);}}
        .brand-text{font-weight:600;font-size:1rem;letter-spacing:-.02em;}
        .brand-sub{font-size:.72rem;color:var(--text-muted);font-weight:400;}
        .status-indicator{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--text-secondary);}
        .status-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;position:relative;}
        .status-dot::after{content:'';position:absolute;inset:-2px;border-radius:50%;border:2px solid #22c55e;animation:statusPulse 2s ease-out infinite;}
        @keyframes statusPulse{0%{transform:scale(1);opacity:1;}100%{transform:scale(2);opacity:0;}}
        .header-actions{display:flex;gap:.75rem;align-items:center;}
        .btn-icon{width:38px;height:38px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
        .btn-icon:hover{background:var(--surface-hover);color:var(--text);transform:translateY(-1px);}
        .btn-icon svg{width:18px;height:18px;}
        /*.chat-container{flex:1;display:flex;flex-direction:column;max-width:980px;width:100%;margin:0 auto;padding:80px 1rem 170px;position:relative;z-index:1;}*/

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 980px;
            width: 100%;
            margin: 0 auto;
            padding: 80px 1rem 170px;
            position: relative;
            z-index: 1;
            height: 100vh; /* Ensure it takes full viewport */
            min-height: 0; /* Critical for flex scrolling */
            overflow: hidden; /* Let messages handle its own scroll */
        }
        /* Replace your current .messages styles with these */
        .messages {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            scroll-behavior: smooth;
            min-height: 0; /* Critical for flex child scrolling */
            padding-right: 4px; /* Space for scrollbar */
        }
        .message{display:flex;gap:.875rem;animation:messageIn .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0;transform:translateY(12px);}
        @keyframes messageIn{to{opacity:1;transform:translateY(0);}}
        .message.user{flex-direction:row-reverse;}
        .avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;}
        .avatar.ai{background:transparent;overflow:hidden;border:2px solid var(--primary);box-shadow:0 2px 8px var(--primary-glow);}
        .avatar.ai img{width:100%;height:100%;object-fit:cover;display:block;}
        .avatar.user{background:var(--surface-hover);color:var(--text-secondary);border:1px solid var(--border);}
        .message-content{max-width:85%;padding:.875rem 1.125rem;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);line-height:1.6;font-size:.95rem;position:relative;}
        .message.user .message-content{background:linear-gradient(135deg,var(--primary),#FF8C42);color:white;border:none;}
        .message.ai .message-content{border-top-left-radius:4px;}
        .message.user .message-content{border-top-right-radius:4px;}
        .typing-indicator{display:flex;gap:.35rem;padding:1rem 1.125rem;}
        .typing-indicator span{width:8px;height:8px;background:var(--primary);border-radius:50%;animation:typingBounce 1.4s ease-in-out infinite;}
        .typing-indicator span:nth-child(2){animation-delay:.2s;}
        .typing-indicator span:nth-child(3){animation-delay:.4s;}
        @keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
        .thinking{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;font-size:.85rem;color:var(--text-muted);font-style:italic;}
        .thinking-dots{display:flex;gap:.2rem;}
        .thinking-dots span{width:4px;height:4px;background:var(--text-muted);border-radius:50%;animation:thinkingPulse 1.5s ease-in-out infinite;}
        .thinking-dots span:nth-child(2){animation-delay:.3s;}
        .thinking-dots span:nth-child(3){animation-delay:.6s;}
        @keyframes thinkingPulse{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:1;transform:scale(1.3);}}
        .card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-top:.75rem;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:var(--transition);cursor:pointer;position:relative;text-decoration:none;color:inherit;box-shadow:var(--shadow);}
        .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary);}
        .card-image{width:100%;height:200px;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--surface-hover),var(--border));flex-shrink:0;}
        .card-image img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;transition:transform .4s ease;}
        .card:hover .card-image img{transform:scale(1.05);}
        .card-image-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary-glow),rgba(123,104,238,.12));color:var(--primary);}
        .card-image-fallback svg{width:36px;height:36px;opacity:.7;}
        .card-category-badge{position:absolute;top:.65rem;left:.65rem;background:rgba(255,255,255,.92);color:var(--secondary);font-size:.68rem;font-weight:700;padding:.25rem .6rem;border-radius:20px;letter-spacing:.04em;backdrop-filter:blur(4px);}
        [data-theme="dark"] .card-category-badge{background:rgba(18,18,26,.88);color:var(--text);}
        .card-body{padding:1rem 1.25rem;flex:1;display:flex;flex-direction:column;gap:.5rem;justify-content:center;}
        .card-title{font-weight:700;font-size:.92rem;color:var(--text);line-height:1.3;flex:1;}
        .card-desc{font-size:.8rem;color:var(--text-secondary);line-height:1.5;flex:1;}
        .card-tags{display:flex;gap:.35rem;flex-wrap:wrap;}
        .tag{font-size:.7rem;padding:.2rem .5rem;background:var(--primary-glow);color:var(--primary);border-radius:4px;font-weight:500;font-family:'JetBrains Mono',monospace;}
        .card-cta{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.25rem;background:var(--primary);color:#fff;font-size:.85rem;font-weight:600;text-decoration:none;border-radius:8px;transition:var(--transition);margin-top:.75rem;width:fit-content;border:none;}
        .card-cta:hover{background:#FF8C42;transform:translateY(-2px);box-shadow:0 4px 12px var(--primary-glow);}
        .card-cta svg{width:16px;height:16px;}
        .skill-item{margin-bottom:.875rem;}
        .skill-header{display:flex;justify-content:space-between;margin-bottom:.4rem;font-size:.85rem;}
        .skill-name{font-weight:500;}
        .skill-level{color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:.8rem;}
        .skill-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
        .skill-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width 1s cubic-bezier(.16,1,.3,1);width:0;}
        .contact-form{display:flex;flex-direction:column;gap:.75rem;margin-top:.75rem;}
        .form-group{display:flex;flex-direction:column;gap:.35rem;}
        .form-label{font-size:.8rem;font-weight:500;color:var(--text-secondary);}
        .form-input{padding:.625rem .875rem;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--bg);color:var(--text);font-family:inherit;font-size:.9rem;transition:var(--transition);outline:none;}
        .form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
        .form-input::placeholder{color:var(--text-muted);}
        input[type="date"]{color-scheme:light;}
        [data-theme="dark"] input[type="date"]{color-scheme:dark;}
        textarea.form-input{resize:vertical;min-height:80px;}
        .btn-primary{padding:.625rem 1.25rem;background:linear-gradient(135deg,var(--primary),#FF8C42);color:white;border:none;border-radius:var(--radius-xs);font-weight:600;font-size:.9rem;cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;justify-content:center;gap:.5rem;font-family:inherit;}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px var(--primary-glow);}
        .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}
        .btn-primary svg{width:16px;height:16px;}
        .quick-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem;}
        .quick-btn{padding:.5rem 1rem;background:var(--surface-hover);border:1px solid var(--border);border-radius:20px;color:var(--text-secondary);font-size:.85rem;cursor:pointer;transition:var(--transition);font-family:inherit;display:inline-flex;align-items:center;gap:.4rem;}
        .quick-btn:hover{background:var(--primary-glow);border-color:var(--primary);color:var(--primary);transform:translateY(-1px);}
        .quick-btn svg{width:14px;height:14px;}
        .input-area{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:1rem 1.5rem 1.5rem;background:linear-gradient(to top,var(--bg) 80%,transparent);}
        .suggestions-row{max-width:800px;margin:0 auto 0.5rem; padding:8px 4px; display:flex;gap:.5rem;overflow-x:auto;scrollbar-width:1px !important; }
        .suggestions-row::-webkit-scrollbar{height:3px !important; width:3px !important; margin-top: 8px !important;}
        .suggestion-chip{white-space:nowrap;padding:.5rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text-secondary);font-size:.85rem;cursor:pointer;transition:var(--transition);font-family:inherit;display:inline-flex;align-items:center;gap:.4rem;flex-shrink:0;}
        .suggestion-chip:hover{background:var(--primary-glow);border-color:var(--primary);color:var(--primary);transform:translateY(-1px);}
        .suggestion-chip svg{width:14px;height:14px;}
        .input-wrapper{max-width:800px;margin:0 auto;display:flex;gap:.75rem;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;box-shadow:var(--shadow-lg);transition:var(--transition);}
        .input-wrapper:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow),var(--shadow-lg);}
        .chat-input{flex:1;border:none;background:transparent; margin-bottom: 5px; color:var(--text);font-family:inherit;font-size:.95rem;resize:none;outline:none;max-height:120px;min-height:24px;line-height:1.5;}
        .chat-input::placeholder{color:var(--text-muted);}
        .send-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#FF8C42);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;}
        .send-btn:hover{transform:scale(1.05);box-shadow:0 4px 12px var(--primary-glow);}
        .send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
        .send-btn svg{width:18px;height:18px;}
        .voice-btn{width:36px;height:36px;border-radius:50%;background:var(--surface-hover);border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;}
        .voice-btn:hover{background:var(--primary-glow);color:var(--primary);}
        .voice-btn.recording{background:#ef4444;color:white;animation:recordingPulse 1.5s ease-in-out infinite;}
        .voice-btn svg{width:18px;height:18px;}
        @keyframes recordingPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4);}50%{box-shadow:0 0 0 8px rgba(239,68,68,0);}}
        .timeline{position:relative;padding-left:1.5rem;margin-top:.75rem;}
        .timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--primary),var(--accent));border-radius:1px;}
        .timeline-item{position:relative;padding-bottom:1.25rem;}
        .timeline-item::before{content:'';position:absolute;left:-1.25rem;top:.35rem;width:10px;height:10px;background:var(--primary);border-radius:50%;border:2px solid var(--surface);box-shadow:0 0 0 2px var(--primary);}
        .timeline-date{font-size:.75rem;color:var(--primary);font-weight:600;font-family:'JetBrains Mono',monospace;margin-bottom:.25rem;}
        .timeline-title{font-weight:600;font-size:.9rem;margin-bottom:.2rem;}
        .timeline-desc{font-size:.85rem;color:var(--text-secondary);line-height:1.4;}
        .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.875rem;margin-top:.75rem;}
        .stat-box{text-align:center;padding:1rem;background:var(--surface-hover);border-radius:var(--radius-xs);border:1px solid var(--border);}
        .stat-number{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .stat-label{font-size:.75rem;color:var(--text-secondary);margin-top:.25rem;}
        .social-links{display:flex;gap:.75rem;margin-top:.75rem;flex-wrap:wrap;}
        .social-link{display:flex;align-items:center;gap:.5rem;padding:.625rem 1rem;background:var(--surface-hover);border:1px solid var(--border);border-radius:var(--radius-xs);color:var(--text);text-decoration:none;font-size:.85rem;transition:var(--transition);}
        .social-link:hover{background:var(--primary-glow);border-color:var(--primary);transform:translateY(-1px);}
        .social-link svg{width:16px;height:16px;}
        .social-link.whatsapp:hover{background:rgba(37,211,102,.12);border-color:#25D366;color:#25D366;}
        ::-webkit-scrollbar{width:6px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
        ::-webkit-scrollbar-thumb:hover{background:var(--text-muted);}
        @media(max-width:640px){
            .chat-container{padding:80px .75rem 190px;}
            .card-grid{grid-template-columns:1fr;}
            .card-body {
                padding: 0.5rem !important;
            }
            .stat-box {
                padding: 0.5rem !important;
            }
            .stats-grid{grid-template-columns:repeat(2,1fr) !important;}
            .message-content{max-width:90%;}
            .header{padding:.75rem 1rem;}
            .input-area{padding:.75rem 1rem 1rem;}
        }
        .welcome-hero{text-align:center;padding:1.5rem 0 1rem;}
        .welcome-hero .profile-photo{width:90px;height:90px;border-radius:50%;overflow:hidden;margin:0 auto 1rem;border:3px solid var(--primary);box-shadow:0 0 0 6px var(--primary-glow);}
        .welcome-hero .profile-photo img{width:100%;height:100%;object-fit:cover;display:block;}
        .welcome-hero h1{font-size:1.6rem;font-weight:700;margin-bottom:.35rem;background:linear-gradient(135deg,var(--text),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .welcome-hero .role-badges{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:.5rem;}
        .role-badge{font-size:.72rem;padding:.25rem .65rem;border-radius:20px;background:var(--primary-glow);color:var(--primary);font-weight:600;border:1px solid rgba(255,169,77,.3);}
        .welcome-hero p{color:var(--text-secondary);font-size:.92rem;}
        .toast{position:fixed;bottom:170px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--secondary);color:white;padding:.75rem 1.25rem;border-radius:var(--radius-xs);font-size:.9rem;box-shadow:var(--shadow-lg);opacity:0;transition:all .3s ease;z-index:200;pointer-events:none;white-space:normal;max-width:min(90vw,400px);width:max-content;text-align:center;word-wrap:break-word;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .cursor-blink::after{content:'|';animation:blink 1s step-end infinite;color:var(--primary);margin-left:2px;}
        @keyframes blink{50%{opacity:0;}}
        .pypi-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:linear-gradient(135deg,#006dad,#005a8c);color:white;border-radius:var(--radius-xs);font-size:.85rem;font-weight:600;text-decoration:none;margin-top:.75rem;transition:var(--transition);}
        .pypi-badge:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,109,173,.3);}
        .project-category{display:none;}
        [data-theme="dark"] .card-cta{background:#1e1e2e;color:var(--text);}
        [data-theme="dark"] .card-cta:hover{background:var(--primary);color:#fff;}
        [data-theme="dark"] .message.ai .message-content{box-shadow:0 4px 6px -1px rgba(0,0,0,.4),0 0 20px rgba(255,169,77,.05);}
        [data-theme="dark"] .card:hover{box-shadow:0 0 30px rgba(255,169,77,.1),var(--shadow-lg);}
        code.inline-code{background:var(--surface-hover);padding:.2rem .4rem;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:.85em;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:4rem 1rem 1rem;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .3s ease;}
        .modal-overlay.open{opacity:1;pointer-events:all;}
        .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;max-width:480px;width:100%;box-shadow:var(--shadow-lg);transform:translateY(20px);transition:transform .3s cubic-bezier(.16,1,.3,1);max-height:85vh;overflow-y:auto;}
        .modal-overlay.open .modal{transform:translateY(0);}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
        .modal-title{font-weight:700;font-size:1.1rem;}
        .modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface-hover);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:var(--transition);}
        .modal-close:hover{background:var(--primary-glow);color:var(--primary);}
        .time-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin:.75rem 0;}
        .time-slot{padding:.5rem;text-align:center;border:1px solid var(--border);border-radius:var(--radius-xs);cursor:pointer;font-size:.82rem;transition:var(--transition);background:var(--surface-hover);}
        .time-slot:hover,.time-slot.selected{background:var(--primary-glow);border-color:var(--primary);color:var(--primary);font-weight:600;}
        .appt-type-row{display:flex;gap:.5rem;margin:.5rem 0 .75rem;}
        .appt-type{flex:1;padding:.6rem;text-align:center;border:1px solid var(--border);border-radius:var(--radius-xs);cursor:pointer;font-size:.82rem;transition:var(--transition);background:var(--surface-hover);}

    // Replace your scrollToBottom function with this
   function scrollToBottom() {
        // Get the last message
        const messages = messagesEl.querySelectorAll('.message');
        const lastMessage = messages[messages.length - 1];
        
        if (!lastMessage) {
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return;
        }
        
        // Calculate position: place last message at ~70% from top of viewport
        // (so 30% of container remains below it)
        const containerHeight = messagesEl.clientHeight;
        const targetOffset = containerHeight * 0.93; // 70% mark from top
        const messageTop = lastMessage.offsetTop;
        
        // Scroll so the message sits at the 70% line
        const scrollTarget = messageTop - targetOffset + (lastMessage.clientHeight / 2);
        
        messagesEl.scrollTo({
            top: Math.max(0, scrollTarget),
            behavior: 'smooth'
        });
    }


    function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

    // Also replace your typewriterEffect scroll calls
    async function typewriterEffect(msgEl, text, speed) {
        speed = speed || 20;
        var content = msgEl.querySelector('.message-content');
        content.innerHTML = '<span id="tw-text"></span><span class="cursor-blink"></span>';
        var span = document.getElementById('tw-text');
        
        for (var i = 0; i < text.length; i++) {
            span.textContent += text[i];
            
            // Scroll every 10 chars to keep typing visible
            if (i % 10 === 0 || i === text.length - 1) {
                // During typing, just keep cursor in view (less aggressive)
                keepCursorInView(msgEl);
            }
            
            await sleep(speed);
        }
        
        var cursor = content.querySelector('.cursor-blink');
        if (cursor) cursor.remove();
        
        // Final positioning at 70% mark
        scrollToBottom();
    }

    // Helper: keep cursor visible without full scroll
    function keepCursorInView(msgEl) {
        const containerRect = messagesEl.getBoundingClientRect();
        const msgRect = msgEl.getBoundingClientRect();
        
        // If message bottom is below 80% of container, scroll up a bit
        const threshold = containerRect.bottom - (containerRect.height * 0.2);
        
        if (msgRect.bottom > threshold) {
            const scrollAmount = msgRect.bottom - threshold + 20;
            messagesEl.scrollBy({ top: scrollAmount, behavior: 'auto' });
        }
    }

    async function sendMessage(){
        var text=chatInput.value.trim();
        if(!text||isTyping) return;
        addMessage(text,true);
        chatInput.value=''; chatInput.style.height='auto';
        isTyping=true; sendBtn.disabled=true;
        scrollToBottom();
        await sleep(400); addThinking(); scrollToBottom();
        await sleep(800+Math.random()*600); removeThinking();
        addTypingIndicator(); scrollToBottom();
        await sleep(600+Math.random()*400); removeTypingIndicator();
        var intent=matchIntent(text);
        var html=generateResponse(intent);
        var isRich=/<(div|a|p|button|input|textarea)/.test(html);
        var msgEl=addMessage('',false);
        scrollToBottom();
        if(isRich){
            msgEl.querySelector('.message-content').innerHTML=html;
            animateSkillBars(); wireQuickBtns(msgEl);
            var submitBtn=msgEl.querySelector('#submitContactBtn');
            if(submitBtn) submitBtn.addEventListener('click',submitContact);
        } else {
            await typewriterEffect(msgEl,html);
        }
        isTyping=false; sendBtn.disabled=false;
        msgEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        scrollToBottom();
    }
    function sendQuick(text){ chatInput.value=text; sendMessage(); }

    document.addEventListener('error', function(e){
        if(e.target.tagName==='IMG'&&e.target.hasAttribute('data-fallback')){
            var fallback=e.target.getAttribute('data-fallback');
            e.target.style.display='none';
            e.target.parentNode.insertAdjacentHTML('beforeend',fallback);
        }
    },true);

    async function initGreeting(){
        var hour=new Date().getHours(), greeting=hour<12?'Good morning':hour<18?'Good afternoon':'Good evening';
        var text=greeting+'! I\'m Goodness — A Full-Stack Developer, Prompt Engineer, AI Consultant, Automation Engineer, and Data Annotator based in Nigeria with 6+ years of experience and 100+ shipped projects. Whether you need a web app, AI integration, automation pipeline, or are looking for a reliable dev partner — you\'re in the right place. What can I help you with?';
